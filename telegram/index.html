/* Window-size fix for mobile mini-app WebViews */
html,
body {
  height: 100%;
  margin: 0;
  overflow: hidden;
  position: fixed;
  inset: 0;
  width: 100%;
  overscroll-behavior: none;
}
body {
  min-height: 0;
  max-height: var(--app-height, 100svh);
}
.viewport {
  width: 100%;
  height: var(--app-height, 100svh);
  min-height: 0;
  max-height: var(--app-height, 100svh);
  overflow: hidden;
  padding: 0;
}
.app {
  height: var(--app-height, 100svh);
  max-height: var(--app-height, 100svh);
  min-height: 0;
  overflow: hidden;
}
.content,
.tabContent {
  position: absolute;
  top: 108px;
  bottom: var(--bottom);
  left: 0;
  right: 0;
  height: auto;
  min-height: 0;
  max-height: none;
  overflow: hidden;
}
.panel {
  height: 100%;
  min-height: 0;
  max-height: 100%;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
input,
textarea,
select,
button {
  font-size: 16px;
  max-width: 100%;
}
textarea {
  resize: none;
  min-height: 96px;
  max-height: 180px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.bottom {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  z-index: 25;
}

<script>

function restoreLocalBackup(){const raw=localStorage.getItem(LS_BACKUP);if(!raw){alert('Резервной копии на этом устройстве пока нет');return}try{const data=JSON.parse(raw);if(Array.isArray(data.entries)&&confirm('Восстановить локальную резервную копию записей?')){setEntries(data.entries);setSyncStatus('Восстановлена локальная резервная копия записей','ok');renderAll();activate('memo')}}catch(e){alert('Резервная копия повреждена')}}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function makeId(){return (crypto&&crypto.randomUUID)?crypto.randomUUID():('entry_'+Date.now()+'_'+Math.random().toString(16).slice(2))}
function setSyncStatus(text,kind='info'){sessionStorage.setItem('lastSyncStatus',JSON.stringify({text,kind,ts:Date.now()}))}
function apiGet(action,params={}){const qs=new URLSearchParams({action,user_key:USER_KEY,...params});return fetch(API_URL+'?'+qs.toString(),{method:'GET',cache:'no-store'}).then(r=>r.json())}
function apiPost(payload){return fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)}).then(r=>r.json())}
function ruDateFromIso(v){if(!v)return new Date().toLocaleDateString('ru-RU');const d=new Date(v);return isNaN(d)?String(v).slice(0,10).split('-').reverse().join('.')||String(v):d.toLocaleDateString('ru-RU')}
function appEntryFromBackend(e){return {entry_id:e.entry_id,date:ruDateFromIso(e.created_at),schema:e.schema_id||e.schema||'',mode:e.mode||'',strategy:e.strategy||'',activation:+e.activation||0,markerScore:+e.marker_score||0,oldPattern:String(e.old_pattern)==='true'||e.old_pattern===true,delta:+e.delta||0,q1:e.q1_situation||'',q2:e.q2_feelings||'',q3:e.q3_thoughts||'',q4:e.q4_auto_action||'',q6:e.q6_formed_when||'',q7:e.q7_critic||'',q8:e.q8_protective_behavior||'',q9:e.q9_reality||'',q10a:e.q10a_loving_parent||'',q10b:e.q10b_healthy_adult||''}}
function scoreListFromObject(scores){return Object.keys(scores).map(id=>({schema_id:id,schema_name:SCHEMAS.find(s=>s.id===id)?.name||id,base_score:SCHEMAS.find(s=>s.id===id)?.base??'',current_score:scores[id]}))}
async function syncFromBackend(){try{const localBefore=getEntries();if(localBefore.length){localStorage.setItem(LS_BACKUP,JSON.stringify({ts:new Date().toISOString(),entries:localBefore}))}const [entriesRes,scoresRes]=await Promise.all([apiGet('entries',{limit:100}),apiGet('scores')]);if(entriesRes.ok&&Array.isArray(entriesRes.entries)){const backendEntries=entriesRes.entries.map(appEntryFromBackend).filter(e=>SCHEMAS.some(s=>s.id===e.schema));const localNow=getEntries();let merged=[...localNow];const seen=new Set(merged.map(e=>e.entry_id).filter(Boolean));backendEntries.forEach(e=>{if(e.entry_id&&!seen.has(e.entry_id)){merged.push(e);seen.add(e.entry_id)}});if(backendEntries.length===0&&localNow.length){setSyncStatus('Общая таблица пока пустая. Локальные записи сохранены на телефоне.','warn')}else{setEntries(merged);setSyncStatus('Данные объединены с общей таблицей','ok')}}if(scoresRes.ok&&Array.isArray(scoresRes.scores)&&scoresRes.scores.length){const localScores=getScores();const scores={...baseScores(),...localScores};scoresRes.scores.forEach(r=>{if(r.schema_id)scores[r.schema_id]=clamp(+r.current_score||0)});setScores(scores)}renderAll()}catch(e){console.warn('sync failed',e);setSyncStatus('Сейчас работаю локально. Общая таблица временно не ответила.','warn');renderAll()}}
async function saveEntryBackend(entry,scores){try{const schema=SCHEMAS.find(s=>s.id===entry.schema);const res=await apiPost({action:'saveEntry',entry:{...entry,user_key:USER_KEY,platform:PLATFORM,schema_id:entry.schema,schema_name:schema?.name||'',created_at:new Date().toISOString(),source:'app'}});await apiPost({action:'saveScores',user_key:USER_KEY,scores:scoreListFromObject(scores)});setSyncStatus(res.ok?'Запись сохранена в общей таблице':'Запись сохранена локально, но таблица ответила ошибкой',res.ok?'ok':'warn')}catch(e){console.warn('backend save failed',e);setSyncStatus('Запись сохранена на телефоне. В общую таблицу пока не ушла.','warn')}finally{renderEntries()}}
async function deleteEntryBackend(e){if(!e.entry_id)return;try{const res=await apiPost({action:'deleteEntry',entry_id:e.entry_id,user_key:USER_KEY});setSyncStatus(res.ok?'Запись удалена из общей таблицы':'Локально удалено, в таблице нужна проверка',res.ok?'ok':'warn')}catch(err){console.warn('backend delete failed',err);setSyncStatus('Удалено на телефоне. В общей таблице удаление пока не подтвердилось.','warn')}finally{renderEntries()}}
async function deleteEntry(idx){const arr=getEntries();const e=arr[idx];if(!e)return;if(!confirm('Удалить эту запись? Проценты по схеме будут откатаны на её сдвиг.'))return;arr.splice(idx,1);setEntries(arr);const d=Number(e.delta)||0;if(e.schema&&d){const scores=getScores();const base=SCHEMAS.find(s=>s.id===e.schema)?.base??0;scores[e.schema]=clamp(Math.round(((scores[e.schema]??base)-d)*10)/10);setScores(scores);apiPost({action:'saveScores',user_key:USER_KEY,scores:scoreListFromObject(scores)}).catch(()=>{})}const schemaName=SCHEMAS.find(s=>s.id===e.schema)?.name||'запись';sessionStorage.setItem('lastDeletedMemoEntry',JSON.stringify({date:e.date||'',schema:schemaName,step:e.q10b||'',remaining:arr.length}));setSyncStatus('Удаляю из общей таблицы…','info');renderEntries();try{renderProgress()}catch(e){};activate('memo');deleteEntryBackend(e)}
function score(s){return Math.round(getScores()[s.id]??s.base)}
function fillClass(v){return v>=65?'r':v>=50?'o':v>=30?'y':'g'}
function activate(tab){$$('.panel').forEach(p=>p.classList.toggle('active',p.dataset.panel===tab));$$('.tabBtn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab)); $('.panel.active')?.scrollTo(0,0)}
function head(icon,title,sub=''){return `<div class="head"><div class="headIcon">${icon}</div><div><div class="title">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div></div>`}
function bar(value){return `<div class="bar"><div class="fill ${fillClass(value)}" style="width:${clamp(value)}%"></div></div>`}
function schemaRow(s){const v=score(s),delta=v-s.base;return `<div class="schemaRow" data-schema="${s.id}"><div class="schemaTop"><strong>${s.name}</strong><span>${v}%</span></div>${bar(v)}<div class="sub" style="margin-top:6px">${s.domain}. ${s.domainTitle} · старт ${s.base}% · ${delta===0?'без изменений':(delta>0?'+'+delta:delta)+'%'}</div></div>`}
function openSchema(id){const s=SCHEMAS.find(x=>x.id===id);if(!s)return;const v=score(s);$('#sheetContent').innerHTML=`<h2 style="margin:0 0 8px">${s.name}</h2><div class="chip">Домен ${s.domain}: ${s.domainTitle}</div><p>${s.desc}</p><div class="card" style="box-shadow:none"><div class="schemaTop"><strong>Текущее влияние</strong><span>${v}%</span></div>${bar(v)}<p class="sub">Старт: ${s.base}%. Процент меняется после заполнения памятки и калибровки.</p></div><h3>Копинг-стратегии</h3><div class="smallCards"><div class="smallCard"><span class="chip">Капитуляция</span><p>${s.cap}</p></div><div class="smallCard"><span class="chip">Избегание</span><p>${s.avoid}</p></div><div class="smallCard"><span class="chip">Гиперкомпенсация</span><p>${s.hyper}</p></div><div class="smallCard"><span class="chip">Выход Здорового Взрослого</span><p>${s.exit}</p></div></div>`;$('#sheet').classList.add('open')}
function renderHome(){const top=SCHEMAS.slice().sort((a,b)=>score(b)-score(a)).slice(0,5);$('#homePanel').innerHTML=`<article class="card clickable" data-open="memo">${head('◔','Кто сейчас у руля?','Факт → схема → потребность → взрослый шаг')}<div class="hero"><div class="sun"></div><h2>Здоровый взрослый</h2><p>Вы делаете выбор осознанно и заботитесь о себе.</p><div class="status"><span class="dot"></span>Опора активна</div></div></article><article class="card clickable" data-open="progress">${head('↗','Индекс взросления','динамика схем и взрослых действий')}<div class="progressBig">${progressGauges()}</div></article><article class="card">${head('♡','Текущее эмоциональное состояние')}<div class="grid2"><div class="mini"><div class="face f1">☹</div><strong>Уязвимый ребёнок</strong><div class="val">3.9</div>${bar(65)}</div><div class="mini"><div class="face f2">◔</div><strong>Сердитый ребёнок</strong><div class="val">3.7</div>${bar(61)}</div><div class="mini"><div class="face f3">☺</div><strong>Счастливый ребёнок</strong><div class="val">3.2</div>${bar(53)}</div><div class="mini"><div class="face f4">◕</div><strong>Здоровый взрослый</strong><div class="val">4.2</div>${bar(70)}</div></div></article><article class="card clickable" data-open="schemas">${head('☰','Активные схемы','нажми на схему, чтобы увидеть стратегии и выход')}<div class="schemaList">${top.map(schemaRow).join('')}</div></article><article class="card clickable" data-open="strategies">${head('⇄','Стратегии защиты','капитуляция · избегание · гиперкомпенсация')}<div class="grid2"><div class="mini"><strong>Капитуляция</strong><div class="sub">замри</div></div><div class="mini"><strong>Избегание</strong><div class="sub">беги</div></div><div class="mini"><strong>Гиперкомпенсация</strong><div class="sub">бей</div></div><div class="mini"><strong>Выход</strong><div class="sub">Здоровый Взрослый</div></div></div></article>`;bindClicks()}
function progressGauges(){const p=progressStats();return `<div class="gauge"><div class="big">${p.index}%</div><div class="sub">Индекс взросления</div></div><div class="gauge"><div class="big">${p.reduction}%</div><div class="sub">Снижение схем</div></div>`}
function progressStats(){const sc=getScores();let totalRed=0;SCHEMAS.forEach(s=>totalRed+=Math.max(0,s.base-(sc[s.id]??s.base)));const reduction=Math.round(totalRed/SCHEMAS.length);const entries=getEntries().slice(-14);let markerAvg=0,oldRate=0;if(entries.length){markerAvg=entries.reduce((a,e)=>a+(e.markerScore||0),0)/entries.length;oldRate=entries.filter(e=>e.oldPattern).length/entries.length}const index=clamp(Math.round(32+reduction*2.2+markerAvg*6-oldRate*12),0,100);return {index,reduction,entries:entries.length}}
function renderMemo(){const opts=SCHEMAS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');$('#memoPanel').innerHTML=`<article class="card">${head('✎','Памятка: полный протокол','все пункты для заполнения')}<div class="field"><label><span class="qNumber">1</span>Когда происходит? Стоп! Что сейчас происходит?</label><textarea id="q1" placeholder="Описание ситуации фактами"></textarea></div><div class="field"><label><span class="qNumber">2</span>Я чувствую</label><textarea id="q2" placeholder="Печаль, уязвимость, злость, тревога..."></textarea></div><div class="field"><label><span class="qNumber">3</span>Потому что я думаю</label><textarea id="q3" placeholder="Какая мысль объясняет чувство?"></textarea></div><div class="field"><label><span class="qNumber">4</span>И я готова сделать</label><textarea id="q4" placeholder="Автоматическое действие: привлечь внимание, замолчать, уколоть..."></textarea></div><div class="field"><label><span class="qNumber">5</span>Какая схема включилась?</label><select id="schemaSelect">${opts}</select></div><div class="field"><label>Режим</label><select id="modeSelect">${MODES.map(m=>`<option>${m[0]}</option>`).join('')}</select></div><div class="field"><label>Копинг-стратегия</label><select id="strategySelect"><option value="capitulation">Капитуляция · замри</option><option value="avoidance">Избегание · беги</option><option value="hypercompensation">Гиперкомпенсация · бей</option></select></div><div class="field"><label><span class="qNumber">6</span>Которая сформировалась, когда</label><textarea id="q6" placeholder="Возраст, воспоминание, контекст"></textarea></div><div class="field"><label><span class="qNumber">7</span>Что диктует схема / критик?</label><textarea id="q7" placeholder="Например: “ты никому не нужна...”"></textarea></div><div class="field"><label><span class="qNumber">8</span>В этот момент я / защитное поведение</label><textarea id="q8" placeholder="Как я веду себя под влиянием схемы?"></textarea></div><div class="field"><label><span class="qNumber">9</span>На самом деле происходит следующее</label><textarea id="q9" placeholder="Факты, реалистичная интерпретация, где я преувеличиваю"></textarea></div><div class="field"><label><span class="qNumber">10</span>Любящий Родитель</label><textarea id="q10a" placeholder="Настенька, тебе грустно, я рядом..."></textarea></div><div class="field"><label><span class="qNumber">10</span>Здоровый Взрослый</label><textarea id="q10b" placeholder="Что я решаю, прошу, уточняю, выбираю?"></textarea></div><div class="field"><label>Активация 0–10</label><input id="activation" type="number" min="0" max="10" value="5"></div><div class="checks"><label class="check"><input type="checkbox" id="m_notice">Я заметила схему</label><label class="check"><input type="checkbox" id="m_need">Я назвала потребность</label><label class="check"><input type="checkbox" id="m_pause">Я взяла паузу</label><label class="check"><input type="checkbox" id="m_body">Я сделала телесную регуляцию</label><label class="check"><input type="checkbox" id="m_adult">Я сделала взрослый шаг</label><label class="check"><input type="checkbox" id="m_request">Я сказала просьбу или границу</label><label class="check"><input type="checkbox" id="m_happy">Я дала место Счастливому ребёнку</label><label class="check"><input type="checkbox" id="m_old">Старый автоматизм всё же управлял мной</label></div><div class="btnRow" style="margin-top:12px"><button class="btn primary" id="saveMemo">Сохранить и обновить проценты</button><button class="btn secondary" id="clearMemo">Очистить</button><button class="btn secondary" id="restoreBackup">Вернуть локальную копию</button></div></article><article class="card">${head('☷','Последние записи','после удаления здесь появляется зелёная плашка')}<div id="saveNotice" class="footerNote" style="display:none;margin:0 0 12px;background:#e6efcf;border-color:#d6e5b6;color:#708b41"></div><div id="deleteNotice" class="footerNote" style="display:none;margin:0 0 12px;background:#e6efcf;border-color:#d6e5b6;color:#708b41"></div><div id="syncNotice" class="footerNote" style="display:none;margin:0 0 12px;background:#eef5ff;border-color:#d5e4f5;color:#47627d"></div><div class="tableWrap"><table><thead><tr><th>Дата</th><th>Схема</th><th>Акт.</th><th>Сдвиг</th><th>Взрослый шаг</th><th>Действие</th></tr></thead><tbody id="entriesBody"></tbody></table></div></article>`;bindMemo();renderEntries()}
function markerScore(){return ['m_notice','m_need','m_pause','m_body','m_adult','m_request','m_happy'].reduce((a,id)=>a+($('#'+id)?.checked?1:0),0)}
function bindMemo(){ $('#saveMemo').onclick=()=>{const id=$('#schemaSelect').value;const act=+$('#activation').value||0;const old=$('#m_old').checked;const ms=markerScore();let positive=0; if($('#m_notice').checked)positive+=.25;if($('#m_need').checked)positive+=.35;if($('#m_pause').checked)positive+=.4;if($('#m_body').checked)positive+=.35;if($('#m_adult').checked)positive+=.55;if($('#m_request').checked)positive+=.5;if($('#m_happy').checked)positive+=.2;let delta=-positive;if(old&&act>=7)delta+=.45;if(!old&&act<=5&&positive>.7)delta-=.25;const scores=getScores();scores[id]=clamp(Math.round(((scores[id]??SCHEMAS.find(s=>s.id===id).base)+delta)*10)/10);setScores(scores);const entry={entry_id:makeId(),date:new Date().toLocaleDateString('ru-RU'),schema:id,mode:$('#modeSelect').value,strategy:$('#strategySelect').value,activation:act,markerScore:ms,oldPattern:old,delta:Math.round(delta*10)/10,q1:$('#q1').value,q2:$('#q2').value,q3:$('#q3').value,q4:$('#q4').value,q6:$('#q6').value,q7:$('#q7').value,q8:$('#q8').value,q9:$('#q9').value,q10a:$('#q10a').value,q10b:$('#q10b').value};const arr=getEntries();arr.push(entry);setEntries(arr);sessionStorage.removeItem('lastDeletedMemoEntry');sessionStorage.setItem('lastSavedMemoEntry',JSON.stringify({date:entry.date,schema:SCHEMAS.find(s=>s.id===entry.schema)?.name||'запись',step:entry.q10b||'',total:arr.length}));setSyncStatus('Сохраняю в общую таблицу…','info');renderEntries();try{renderProgress()}catch(e){};activate('memo');setTimeout(()=>{$('#entriesBody')?.scrollIntoView({behavior:'smooth',block:'center'})},80);saveEntryBackend(entry,scores)}; $('#clearMemo').onclick=()=>$$('#memoPanel textarea').forEach(t=>t.value=''); const rb=$('#restoreBackup'); if(rb)rb.onclick=restoreLocalBackup}
function renderEntries(){const body=$('#entriesBody');if(!body)return;const arr=getEntries();const saveNotice=$('#saveNotice');if(saveNotice){const rawSave=sessionStorage.getItem('lastSavedMemoEntry');if(rawSave){try{const d=JSON.parse(rawSave);saveNotice.innerHTML=`<strong>Сохранено:</strong> строка добавлена в таблицу ниже<br><span class="sub">${esc(d.date)} · ${esc(d.schema)} · всего записей: ${esc(d.total)}${d.step?` · ${esc(d.step).slice(0,90)}`:''}</span>`;saveNotice.style.display='block'}catch(e){saveNotice.style.display='none'}}else{saveNotice.style.display='none'}}const notice=$('#deleteNotice');if(notice){const raw=sessionStorage.getItem('lastDeletedMemoEntry');if(raw){try{const d=JSON.parse(raw);notice.innerHTML=`<strong>Удалено:</strong> ${esc(d.date)} · ${esc(d.schema)}<br><span class="sub">Осталось записей: ${esc(d.remaining)}${d.step?` · ${esc(d.step).slice(0,90)}`:''}</span>`;notice.style.display='block'}catch(e){notice.style.display='none'}}else{notice.style.display='none'}}const syncNotice=$('#syncNotice');if(syncNotice){const rawSync=sessionStorage.getItem('lastSyncStatus');if(rawSync){try{const d=JSON.parse(rawSync);syncNotice.innerHTML=`${esc(d.text)}`;syncNotice.style.display='block';syncNotice.style.borderColor=d.kind==='ok'?'rgba(79,132,80,.22)':'rgba(177,107,74,.25)'}catch(e){syncNotice.style.display='none'}}else{syncNotice.style.display='none'}}const rows=arr.map((e,i)=>({...e,_i:i})).slice(-8).reverse();body.innerHTML=rows.length?rows.map(e=>`<tr><td>${esc(e.date)}</td><td>${esc(SCHEMAS.find(s=>s.id===e.schema)?.name||'—')}</td><td>${esc(e.activation)}</td><td>${esc(e.delta)}</td><td>${esc(e.q10b||'—')}</td><td><button class="btn secondary deleteEntryBtn" data-delete-entry="${e._i}" style="padding:7px 9px;border-radius:12px;font-size:12px">Удалить</button></td></tr>`).join(''):`<tr><td colspan="6" style="color:var(--muted)">Пока записей нет</td></tr>`;$$('[data-delete-entry]',body).forEach(b=>b.onclick=()=>deleteEntry(+b.dataset.deleteEntry))}
function renderProgress(){const p=progressStats();const changed=SCHEMAS.slice().sort((a,b)=>(a.base-score(a))-(b.base-score(b))).reverse();$('#progressPanel').innerHTML=`<article class="card">${head('↗','Прогресс взросления','схемы меняют проценты по мере работы')}<div class="progressBig">${progressGauges()}</div><p class="sub">Индекс растёт, когда ты замечаешь схему, берёшь паузу, возвращаешься в тело, говоришь просьбу/границу и делаешь взрослый шаг.</p></article><article class="card">${head('☰','Динамика схем','стартовый процент → текущий процент')}<div class="schemaList">${changed.map(schemaRow).join('')}</div></article><article class="card">${head('⚙','Еженедельная калибровка после сессии')}<div class="field"><label>Схема</label><select id="calSchema">${SCHEMAS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div><div class="field"><label>Текущий процент 0–100</label><input id="calValue" type="number" min="0" max="100" value="50"></div><div class="btnRow"><button class="btn primary" id="saveCal">Сохранить процент</button><button class="btn secondary" id="resetScores">Сбросить к стартовым</button></div></article>`;$('#saveCal').onclick=()=>{const scores=getScores();scores[$('#calSchema').value]=clamp(+$('#calValue').value||0);setScores(scores);apiPost({action:'saveScores',user_key:USER_KEY,scores:scoreListFromObject(scores)}).then(()=>setSyncStatus('Процент сохранён в общей таблице','ok')).catch(()=>setSyncStatus('Процент сохранён локально. Общая таблица временно не ответила.','warn')).finally(()=>renderEntries());renderAll();activate('progress')};$('#resetScores').onclick=()=>{if(confirm('Сбросить динамические проценты к стартовым?')){setScores(baseScores());apiPost({action:'saveScores',user_key:USER_KEY,scores:scoreListFromObject(baseScores())}).catch(()=>{});renderAll();activate('progress')}};bindClicks()}
function renderSchemas(){const domains=[...new Set(SCHEMAS.map(s=>s.domain+'|'+s.domainTitle))];$('#schemasPanel').innerHTML=`<article class="card">${head('☰','18 дисфункциональных схем по доменам','нажми на домен или схему')}</article>`+domains.map(d=>{const [dom,title]=d.split('|');const list=SCHEMAS.filter(s=>s.domain===dom);return `<div class="domainBlock"><div class="domainHead"><strong>Домен ${dom}: ${title}</strong><span>⌄</span></div><div class="domainBody">${list.map(schemaRow).join('')}</div></div>`}).join('');$$('.domainHead').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('closed'));bindClicks()}

function normSearch(s){return (s||'').toLowerCase().trim().replace(/ё/g,'е')}
function searchMatches(raw){
  const q=normSearch(raw); if(!q)return [];
  const out=[];
  SCHEMAS.forEach(s=>{
    const hay=normSearch([s.name,s.domainTitle,s.need,s.desc,s.cap,s.avoid,s.hyper,s.exit].join(' '));
    if(hay.includes(q)||q.includes(normSearch(s.name).split('/')[0].trim())) out.push({type:'schema',title:s.name,sub:`Домен ${s.domain}: ${s.domainTitle}`,id:s.id,tab:'schemas'});
  });
  SEARCH_SECTIONS.forEach(sec=>{
    const ok=sec.words.some(w=>q.includes(normSearch(w))||normSearch(w).includes(q));
    if(ok) out.push({type:'section',title:sec.title,sub:'Открыть раздел',tab:sec.tab});
  });
  const seen=new Set();
  return out.filter(x=>{const key=x.type+'|'+(x.id||x.tab);if(seen.has(key))return false;seen.add(key);return true}).slice(0,12);
}
function openSearchSheet(q,matches){
  $('#sheetContent').innerHTML=`<h2 style="margin:0 0 8px">Поиск</h2><p class="sub">Запрос: <b>${q||'—'}</b></p>`+(matches.length?`<div class="smallCards">${matches.map(m=>`<button class="btn secondary" style="text-align:left;box-shadow:none" data-search-type="${m.type}" data-search-id="${m.id||''}" data-search-tab="${m.tab}"><b>${m.title}</b><br><span class="sub">${m.sub}</span></button>`).join('')}</div>`:`<div class="footerNote">Ничего не нашла. Попробуй: “самопожертвование”, “памятка”, “капитуляция”, “тело”, “отношения”, “прогресс”.</div>`);
  $('#sheet').classList.add('open');
  $$('[data-search-tab]').forEach(btn=>btn.onclick=()=>{const type=btn.dataset.searchType;const tab=btn.dataset.searchTab;const id=btn.dataset.searchId;$('#sheet').classList.remove('open');activate(tab);if(type==='schema'&&id)setTimeout(()=>openSchema(id),80)});
}
function runSearch(showSheet=false){
  const q=$('#searchInput').value; const matches=searchMatches(q); $('#searchBtn').classList.toggle('found',!!matches.length);
  if(!q.trim()){ $('#searchInput').focus(); return; }
  if(showSheet){ if(matches.length===1&&matches[0].type==='schema'){activate('schemas');setTimeout(()=>openSchema(matches[0].id),80)}else{openSearchSheet(q,matches)}; return; }
  if(matches[0])activate(matches[0].tab);
}
$('#searchInput').addEventListener('input',()=>runSearch(false));
$('#searchInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();runSearch(true)}});
$('#searchBtn').addEventListener('click',e=>{e.preventDefault();runSearch(true)});
if(localStorage.getItem(LS_THEME)==='night'){$('#nightBtn').click()}renderAll();syncFromBackend();
</script>

<script>

  if(!tg) return;
  try {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#f7efe7');
    tg.setBackgroundColor('#e7d5c3');
    document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#e7d5c3');
    document.querySelectorAll('button,.iconBtn,.card.clickable,[data-open],[data-schema]').forEach(el=>{
      el.addEventListener('click',()=>{ try{ tg.HapticFeedback.impactOccurred('light'); }catch(e){} }, {passive:true});
    });
  } catch(e) { console.warn('Telegram init warning', e); }
})();
</script>

<script>
(function(){
  function setAppHeight(){
    const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', `${height}px`);
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight, {passive:true});
  window.addEventListener('orientationchange', setAppHeight, {passive:true});
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setAppHeight, {passive:true});
    window.visualViewport.addEventListener('scroll', setAppHeight, {passive:true});
  }
})();
</script>
