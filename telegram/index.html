*{box-sizing:border-box}html,body{height:100%;margin:0}body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#d6c0a8,#e7d5c3);color:var(--ink);overflow:hidden}.viewport{height:100dvh;display:grid;place-items:center;padding:8px}.app{width:min(100%,430px);height:100%;max-height:940px;background:rgba(247,239,231,.97);border:1px solid rgba(255,255,255,.5);border-radius:32px;box-shadow:0 30px 70px rgba(81,55,35,.2);position:relative;overflow:hidden}.top{padding:12px 12px 8px;border-bottom:1px solid var(--line);background:rgba(250,245,239,.96)}.toprow{display:flex;align-items:center;gap:10px}.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(180deg,#d8c0aa,#c8a68a);display:grid;place-items:center;color:#fff;font-weight:800}.hello{min-width:0;flex:1}.hello strong{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hello span{font-size:11px;color:var(--muted)}.iconBtn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);display:grid;place-items:center;cursor:pointer}.searchrow{display:flex;gap:8px;margin-top:10px}.search{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:11px 13px;color:var(--muted)}.search input{border:0;background:transparent;outline:0;min-width:0;width:100%;color:var(--ink)}.searchIcon{border:0;background:#f2ddcf;color:#8b552d;border-radius:50%;width:30px;height:30px;display:grid;place-items:center;cursor:pointer;flex:none;font-weight:950;line-height:1}.searchIcon:active{transform:scale(.94)}.searchIcon.found{background:var(--green2);color:#708b41}.theme{display:flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px}.theme button{border:0;background:transparent;border-radius:999px;padding:8px 9px;font-weight:800;color:var(--muted);cursor:pointer}.theme button.active{background:#f2ddcf;color:#8b552d}.content{position:absolute;left:0;right:0;top:108px;bottom:var(--bottom);overflow:hidden}.panel{position:absolute;inset:0;display:none;padding:12px;overflow:auto;-webkit-overflow-scrolling:touch}.panel.active{display:block}.stack{display:grid;gap:12px}.card{background:rgba(255,250,245,.98);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:15px;overflow:hidden}.card.clickable{cursor:pointer;transition:.14s transform}.card.clickable:active{transform:scale(.985)}.head{display:flex;align-items:flex-start;gap:10px;margin-bottom:11px}.headIcon{width:34px;height:34px;border-radius:14px;background:#fff6ef;border:1px solid var(--line);display:grid;place-items:center;color:#88664f;flex:none}.title{font-size:15px;font-weight:850}.sub{font-size:12px;color:var(--muted);line-height:1.3}.hero{text-align:center}.sun{width:116px;height:116px;border-radius:50%;margin:4px auto 12px;background:linear-gradient(180deg,#f5ddcb,#efc39d);border:1px solid #edcbb5;position:relative;overflow:hidden}.sun:before{content:"";position:absolute;width:56px;height:56px;border-radius:50%;left:30px;top:25px;background:radial-gradient(circle at 35% 35%,#fff9e9,#f4c986 70%,#eeb36d)}.sun:after{content:"";position:absolute;left:12px;right:12px;bottom:20px;height:25px;border-radius:30px;background:#efc394}.hero h2{font-size:19px;margin:0 0 6px}.hero p{margin:0;color:var(--muted);font-size:14px}.status{display:inline-flex;margin-top:12px;gap:7px;align-items:center;padding:8px 12px;border-radius:999px;background:var(--green2);border:1px solid #d6e5b6;color:#708b41;font-size:12px;font-weight:800}.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mini{background:#fffdfa;border:1px solid var(--line);border-radius:18px;padding:11px}.mini strong{font-size:12.5px}.face{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;margin-bottom:6px}.f1{background:#f5dcca}.f2{background:#f1cdc4}.f3{background:#f4dfb5}.f4{background:#dfeac8}.val{font-size:18px;font-weight:900}.bar{height:8px;background:#efe3d8;border-radius:999px;overflow:hidden}.fill{height:100%;border-radius:999px}.o{background:linear-gradient(90deg,#ef9c73,#e98551)}.g{background:linear-gradient(90deg,#c6d98b,#94b252)}.y{background:linear-gradient(90deg,#edcd85,#e5b75c)}.r{background:linear-gradient(90deg,#e9957f,#e47660)}.metric{display:grid;grid-template-columns:1fr auto 86px;gap:9px;align-items:center;margin-top:9px}.metric .name{font-size:12.5px;font-weight:700}.metric .num{font-weight:900}.schemaList,.barList{display:grid;gap:9px}.schemaRow,.barItem{background:#fffdfa;border:1px solid var(--line);border-radius:18px;padding:12px;cursor:pointer}.schemaTop,.barTop{display:flex;justify-content:space-between;gap:10px;align-items:start;margin-bottom:7px}.schemaTop strong,.barTop strong{font-size:13.5px}.schemaTop span,.barTop span{font-weight:900}.domainChip,.chip{display:inline-flex;gap:6px;align-items:center;padding:6px 9px;background:#fff6ef;border:1px solid var(--line);border-radius:999px;color:#8c6042;font-size:11.5px;font-weight:800}.domainBlock{border:1px solid var(--line);border-radius:22px;background:#fffdfa;overflow:hidden}.domainHead{padding:13px;display:flex;justify-content:space-between;gap:10px;align-items:center;cursor:pointer;background:#f7eee5}.domainHead strong{font-size:14px}.domainBody{display:grid;gap:9px;padding:10px}.domainBlock.closed .domainBody{display:none}.strategyCard{background:#fffdfa;border:1px solid var(--line);border-radius:20px;padding:13px;cursor:pointer}.strategyCard ul{margin:8px 0 0;padding-left:18px}.strategyDetails{display:none}.strategyCard.open .strategyDetails{display:block}.field{display:grid;gap:6px;margin-bottom:10px}.field label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:#8d7766}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:#fffdfa;color:var(--ink);border-radius:16px;padding:12px 13px;outline:0}.field textarea{min-height:76px;resize:vertical}.qNumber{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:10px;background:#f3dfd0;color:#8b552d;margin-right:6px;font-weight:900}.checks{display:grid;gap:8px}.check{display:flex;gap:8px;align-items:flex-start;font-size:13px;background:#fffdfa;border:1px solid var(--line);border-radius:14px;padding:9px}.check input{accent-color:var(--orange);margin-top:2px}.btnRow{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:11px 13px;font-weight:900;box-shadow:var(--shadow);cursor:pointer}.primary{background:linear-gradient(180deg,#ef9d70,#df7f47);color:#fff}.secondary{background:#fff8f2;color:var(--ink);border:1px solid var(--line)}.softBtn{background:var(--green2);color:#708b41;border:1px solid #d6e5b6}.progressBig{display:grid;grid-template-columns:1fr 1fr;gap:10px}.gauge{background:#fffdfa;border:1px solid var(--line);border-radius:20px;padding:14px;text-align:center}.gauge .big{font-size:28px;font-weight:950}.trend{font-size:12px;color:var(--muted)}.tableWrap{border:1px solid var(--line);border-radius:18px;overflow:auto;background:#fffdfa}table{border-collapse:collapse;width:100%;min-width:620px}th,td{padding:10px;border-bottom:1px solid var(--line);font-size:12.5px;text-align:left;vertical-align:top}th{background:#f4ebe1;text-transform:uppercase;letter-spacing:.06em;color:#8c7665;font-size:10.5px}.smallCards{display:grid;gap:10px}.smallCard{background:#fffdfa;border:1px solid var(--line);border-radius:18px;padding:13px}.smallCard h4{margin:8px 0 6px}.smallCard p{margin:0;color:var(--muted);font-size:13px}.smallCard ul{margin:8px 0 0;padding-left:18px}.weekGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.day{background:#fffdfa;border:1px solid var(--line);border-radius:18px;padding:12px}.footerNote{background:#fff3ee;border:1px solid #efcec1;color:#89584d;border-radius:18px;padding:13px;font-size:13px}.bottom{position:absolute;left:0;right:0;bottom:0;height:var(--bottom);padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px));background:rgba(250,245,239,.99);border-top:1px solid var(--line)}.navGrid{height:100%;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(2,1fr);gap:6px}.tabBtn{border:1px solid var(--line);background:#fff8f1;color:var(--ink);border-radius:16px;font-size:10.5px;font-weight:850;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 8px 16px rgba(108,77,52,.08);cursor:pointer;min-width:0}.tabBtn span{font-size:15px}.tabBtn.active{background:#f2dfd1;color:#914e25;border-color:#edc3a5}.sheet{position:absolute;inset:0;background:rgba(64,45,32,.28);display:none;align-items:flex-end;z-index:30}.sheet.open{display:flex}.sheetPanel{width:100%;max-height:82%;overflow:auto;background:var(--app);border-radius:28px 28px 0 0;padding:16px;border-top:1px solid rgba(255,255,255,.5);box-shadow:0 -20px 45px rgba(80,54,35,.22)}.sheetClose{float:right}.dark{--app:#2e2824;--card:#3a322d;--soft:#443a34;--line:#54483f;--ink:#f8efe7;--muted:#c9b7a8;--bg:#2c2520}.dark .app{background:#2e2824}.dark body,.dark{background:#211c19}.dark .top,.dark .bottom{background:#302923}.dark .card,.dark .mini,.dark .schemaRow,.dark .barItem,.dark .field input,.dark .field textarea,.dark .field select,.dark .smallCard,.dark .strategyCard,.dark .domainBlock,.dark .gauge,.dark .tableWrap{background:#3a322d}.dark .domainHead,.dark th{background:#443a34}@media(max-width:360px){:root{--bottom:128px}.tabBtn{font-size:9.5px;border-radius:14px}.tabBtn span{font-size:14px}.content{top:106px}.app{border-radius:24px}.viewport{padding:4px}}

<script>
const SCHEMAS = [{"id": "abandonment", "name": "Покинутость / нестабильность", "domain": "I", "domainTitle": "Нарушение связи и отвержение", "base": 72, "need": "безопасность, стабильность, здоровая привязанность", "desc": "Стойкое чувство, что важные люди эмоционально нестабильны, непредсказуемы, могут исчезнуть, отказаться или выбрать кого-то другого.", "cap": "Выбирает недоступных или непредсказуемых партнёров и значимых людей.", "avoid": "Избегает близких отношений из-за страха быть оставленной.", "hyper": "Отталкивает партнёров, контролирует, становится собственнической.", "exit": "Проверить факты, назвать страх, попросить определённость прямо, держать свою жизнь не на паузе, выбирать стабильные связи."}, {"id": "mistrust", "name": "Недоверие / ожидание жестокого обращения", "domain": "I", "domainTitle": "Нарушение связи и отвержение", "base": 36, "need": "защита, уважение, безопасная близость", "desc": "Ожидание, что другие будут делать больно, унижать, лгать, манипулировать или использовать.", "cap": "Выбирает ненадёжных людей; остаётся бдительной и подозрительной.", "avoid": "Избегает близости в личной и деловой жизни, закрывается.", "hyper": "Плохо обращается с людьми, эксплуатирует или заранее атакует.", "exit": "Разделить риск и прошлый опыт, ставить ясные границы, проверять фактами, строить доверие постепенно."}, {"id": "emotional_deprivation", "name": "Эмоциональная депривация", "domain": "I", "domainTitle": "Нарушение связи и отвержение", "base": 68, "need": "тепло, внимание, забота, сочувствие, поддержка", "desc": "Ожидание, что нормальная эмоциональная поддержка, забота, сочувствие и защита не будут получены.", "cap": "Выбирает эмоционально холодных и отстранённых людей; не принимает эмоциональную отдачу.", "avoid": "Отстраняется в общении, избегает близости и общества.", "hyper": "Предъявляет нереалистичные требования, чтобы другие закрыли все потребности.", "exit": "Назвать конкретную потребность, попросить тепло прямо, принять заботу, распределить function progressGauges(){const p=progressStats();return `<div class="gauge"><div class="big">${p.index}%</div><div class="sub">Индекс взросления</div></div><div class="gauge"><div class="big">${p.reduction}%</div><div class="sub">Снижение схем</div></div>`}
function progressStats(){const sc=getScores();let totalRed=0;SCHEMAS.forEach(s=>totalRed+=Math.max(0,s.base-(sc[s.id]??s.base)));const reduction=Math.round(totalRed/SCHEMAS.length);const entries=getEntries().slice(-14);let markerAvg=0,oldRate=0;if(entries.length){markerAvg=entries.reduce((a,e)=>a+(e.markerScore||0),0)/entries.length;oldRate=entries.filter(e=>e.oldPattern).length/entries.length}const index=clamp(Math.round(32+reduction*2.2+markerAvg*6-oldRate*12),0,100);return {index,reduction,entries:entries.length}}
function renderMemo(){const opts=SCHEMAS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');$('#memoPanel').innerHTML=`<article class="card">${head('✎','Памятка: полный протокол','все пункты для заполнения')}<div class="field"><label><span class="qNumber">1</span>Когда происходит? Стоп! Что сейчас происходит?</label><textarea id="q1" placeholder="Описание ситуации фактами"></textarea></div><div class="field"><label><span class="qNumber">2</span>Я чувствую</label><textarea id="q2" placeholder="Печаль, уязвимость, злость, тревога..."></textarea></div><div class="field"><label><span class="qNumber">3</span>Потому что я думаю</label><textarea id="q3" placeholder="Какая мысль объясняет чувство?"></textarea></div><div class="field"><label><span class="qNumber">4</span>И я готова сделать</label><textarea id="q4" placeholder="Автоматическое действие: привлечь внимание, замолчать, уколоть..."></textarea></div><div class="field"><label><span class="qNumber">5</span>Какая схема включилась?</label><select id="schemaSelect">${opts}</select></div><div class="field"><label>Режим</label><select id="modeSelect">${MODES.map(m=>`<option>${m[0]}</option>`).join('')}</select></div><div class="field"><label>Копинг-стратегия</label><select id="strategySelect"><option value="capitulation">Капитуляция · замри</option><option value="avoidance">Избегание · беги</option><option value="hypercompensation">Гиперкомпенсация · бей</option></select></div><div class="field"><label><span class="qNumber">6</span>Которая сформировалась, когда</label><textarea id="q6" placeholder="Возраст, воспоминание, контекст"></textarea></div><div class="field"><label><span class="qNumber">7</span>Что диктует схема / критик?</label><textarea id="q7" placeholder="Например: “ты никому не нужна...”"></textarea></div><div class="field"><label><span class="qNumber">8</span>В этот момент я / защитное поведение</label><textarea id="q8" placeholder="Как я веду себя под влиянием схемы?"></textarea></div><div class="field"><label><span class="qNumber">9</span>На самом деле происходит следующее</label><textarea id="q9" placeholder="Факты, реалистичная интерпретация, где я преувеличиваю"></textarea></div><div class="field"><label><span class="qNumber">10</span>Любящий Родитель</label><textarea id="q10a" placeholder="Настенька, тебе грустно, я рядом..."></textarea></div><div class="field"><label><span class="qNumber">10</span>Здоровый Взрослый</label><textarea id="q10b" placeholder="Что я решаю, прошу, уточняю, выбираю?"></textarea></div><div class="field"><label>Активация 0–10</label><input id="activation" type="number" min="0" max="10" value="5"></div><div class="checks"><label class="check"><input type="checkbox" id="m_notice">Я заметила схему</label><label class="check"><input type="checkbox" id="m_need">Я назвала потребность</label><label class="check"><input type="checkbox" id="m_pause">Я взяла паузу</label><label class="check"><input type="checkbox" id="m_body">Я сделала телесную регуляцию</label><label class="check"><input type="checkbox" id="m_adult">Я сделала взрослый шаг</label><label class="check"><input type="checkbox" id="m_request">Я сказала просьбу или границу</label><label class="check"><input type="checkbox" id="m_happy">Я дала место Счастливому ребёнку</label><label class="check"><input type="checkbox" id="m_old">Старый автоматизм всё же управлял мной</label></div><div class="btnRow" style="margin-top:12px"><button class="btn primary" id="saveMemo">Сохранить и обновить проценты</button><button class="btn secondary" id="clearMemo">Очистить</button></div></article><article class="card">${head('☷','Последние записи')}<div class="tableWrap"><table><thead><tr><th>Дата</th><th>Схема</th><th>Акт.</th><th>Сдвиг</th><th>Взрослый шаг</th></tr></thead><tbody id="entriesBody"></tbody></table></div></article>`;bindMemo();renderEntries()}
function markerScore(){return ['m_notice','m_need','m_pause','m_body','m_adult','m_request','m_happy'].reduce((a,id)=>a+($('#'+id)?.checked?1:0),0)}
function bindMemo(){ $('#saveMemo').onclick=()=>{const id=$('#schemaSelect').value;const act=+$('#activation').value||0;const old=$('#m_old').checked;const ms=markerScore();let positive=0; if($('#m_notice').checked)positive+=.25;if($('#m_need').checked)positive+=.35;if($('#m_pause').checked)positive+=.4;if($('#m_body').checked)positive+=.35;if($('#m_adult').checked)positive+=.55;if($('#m_request').checked)positive+=.5;if($('#m_happy').checked)positive+=.2;let delta=-positive;if(old&&act>=7)delta+=.45;if(!old&&act<=5&&positive>.7)delta-=.25;const scores=getScores();scores[id]=clamp(Math.round(((scores[id]??SCHEMAS.find(s=>s.id===id).base)+delta)*10)/10);setScores(scores);const entry={date:new Date().toLocaleDateString('ru-RU'),schema:id,mode:$('#modeSelect').value,strategy:$('#strategySelect').value,activation:act,markerScore:ms,oldPattern:old,delta:Math.round(delta*10)/10,q1:$('#q1').value,q2:$('#q2').value,q3:$('#q3').value,q4:$('#q4').value,q6:$('#q6').value,q7:$('#q7').value,q8:$('#q8').value,q9:$('#q9').value,q10a:$('#q10a').value,q10b:$('#q10b').value};const arr=getEntries();arr.push(entry);setEntries(arr);renderAll();activate('progress')}; $('#clearMemo').onclick=()=>$$('#memoPanel textarea').forEach(t=>t.value='')}
function renderEntries(){const body=$('#entriesBody');if(!body)return;const arr=getEntries();body.innerHTML=arr.length?arr.slice(-8).reverse().map(e=>`<tr><td>${e.date}</td><td>${SCHEMAS.find(s=>s.id===e.schema)?.name||'—'}</td><td>${e.activation}</td><td>${e.delta}</td><td>${e.q10b||'—'}</td></tr>`).join(''):`<tr><td colspan="5" style="color:var(--muted)">Пока записей нет</td></tr>`}
function renderProgress(){const p=progressStats();const changed=SCHEMAS.slice().sort((a,b)=>(a.base-score(a))-(b.base-score(b))).reverse();$('#progressPanel').innerHTML=`<article class="card">${head('↗','Прогресс взросления','схемы меняют проценты по мере работы')}<div class="progressBig">${progressGauges()}</div><p class="sub">Индекс растёт, когда ты замечаешь схему, берёшь паузу, возвращаешься в тело, говоришь просьбу/границу и делаешь взрослый шаг.</p></article><article class="card">${head('☰','Динамика схем','стартовый процент → текущий процент')}<div class="schemaList">${changed.map(schemaRow).join('')}</div></article><article class="card">${head('⚙','Еженедельная калибровка после сессии')}<div class="field"><label>Схема</label><select id="calSchema">${SCHEMAS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div><div class="field"><label>Текущий процент 0–100</label><input id="calValue" type="number" min="0" max="100" value="50"></div><div class="btnRow"><button class="btn primary" id="saveCal">Сохранить процент</button><button class="btn secondary" id="resetScores">Сбросить к стартовым</button></div></article>`;$('#saveCal').onclick=()=>{const scores=getScores();scores[$('#calSchema').value]=clamp(+$('#calValue').value||0);setScores(scores);renderAll();activate('progress')};$('#resetScores').onclick=()=>{if(confirm('Сбросить динамические проценты к стартовым?')){setScores(baseScores());renderAll();activate('progress')}};bindClicks()}
function renderSchemas(){const domains=[...new Set(SCHEMAS.map(s=>s.domain+'|'+s.domainTitle))];$('#schemasPanel').innerHTML=`<article class="card">${head('☰','18 дисфункциональных схем по доменам','нажми на домен или схему')}</article>`+domains.map(d=>{const [dom,title]=d.split('|');const list=SCHEMAS.filter(s=>s.domain===dom);return `<div class="domainBlock"><div class="domainHead"><strong>Домен ${dom}: ${title}</strong><span>⌄</span></div><div class="domainBody">${list.map(schemaRow).join('')}</div></div>`}).join('');$$('.domainHead').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('closed'));bindClicks()}
function renderStrategies(){ $('#strategiesPanel').innerHTML=`<article class="card">${head('⇄','Копинг-стратегии и выходы','как схема защищается и как выйти в Здорового Взрослого')}</article>`+STRATEGIES.map(st=>`<div class="strategyCard"><div class="barTop"><strong>${st.name}</strong><span>⌄</span></div><p class="sub">${st.desc}</p><div class="strategyDetails"><h4>Как проявляется</h4><ul>${st.signs.map(x=>`<li>${x}</li>`).join('')}</ul><h4>Выход</h4><ul>${st.exits.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`).join('')+`<article class="card">${head('☰','Стратегии по каждой схеме')}<div class="schemaList">${SCHEMAS.map(schemaRow).join('')}</div></article>`;$$('.strategyCard').forEach(c=>c.onclick=()=>c.classList.toggle('open'));bindClicks()}
function renderModes(){ $('#modesPanel').innerHTML=`<article class="card">${head('◎','Режимы: внутренняя команда','цифры сохранены из первой версии')}<div class="barList">${MODES.map(m=>`<div class="barItem"><div class="barTop"><strong>${m[0]}</strong><span>${m[1]}</span></div>${bar(m[1]/6*100)}<div class="sub" style="margin-top:6px">${m[2]}</div></div>`).join('')}</div></article>`}
function renderDecision(){ $('#decisionPanel').innerHTML=`<article class="card">${head('✓','Блок принятия решений','перед отношениями, деньгами, работой, конфликтами')}<div class="smallCard"><strong>Я хочу решить задачу или снять боль?</strong></div><ol><li>Я сейчас спокойна телом или меня несёт?</li><li>Я боюсь потери, стыда, критики, одиночества?</li><li>Решение из любви к себе или из попытки заслужить любовь?</li><li>Я капитулирую, избегаю или гиперкомпенсирую?</li><li>Какие факты у меня есть?</li><li>Что я выберу через 24 часа?</li><li>Какой самый маленький взрослый шаг сегодня?</li></ol><button class="btn primary" data-open="memo">Заполнить памятку</button></article>`;bindClicks()}
function renderProtocols(){ $('#protocolsPanel').innerHTML=`<article class="card">${head('❋','Готовые протоколы','быстрый выход из режимов')}</article><div class="smallCards"><div class="smallCard"><span class="chip">Уязвимый ребёнок</span><h4>Когда больно и одиноко</h4><ul><li>Назвать: “мне больно”</li><li>Обнять себя физически</li><li>Сказать: “Настенька, я рядом”</li><li>Попросить контакт прямо</li></ul></div><div class="smallCard"><span class="chip">Сердитый ребёнок</span><h4>Когда хочется уколоть</h4><ul><li>Первое сообщение не отправлять</li><li>Сырой текст — в заметки</li><li>Найти потребность под злостью</li><li>Сформулировать границу</li></ul></div><div class="smallCard"><span class="chip">Критик</span><h4>Когда “я всё испортила”</h4><ul><li>Отделить факт от наказания</li><li>Назвать голос критика</li><li>Убрать приговоры</li><li>Следующий шаг на 25 минут</li></ul></div><div class="smallCard"><span class="chip">Послушный капитулянт</span><h4>Когда хочется согласиться</h4><ul><li>Пауза 12–24 часа</li><li>“Мне нужно подумать”</li><li>Спросить: “чего хочу я?”</li><li>Ответить из выбора</li></ul></div></div>`}
function renderBody(){ $('#bodyPanel').innerHTML=`<article class="card">${head('◌','Тело и тревога','сначала регуляция, потом решения')}<div class="smallCards"><div class="smallCard"><h4>1. Дыхание</h4><p>10 спокойных циклов. Вдох — живот мягко расширяется. Выдох — живот мягко подтягивается.</p><span class="chip">2 минуты</span></div><div class="smallCard"><h4>2. Стопы и челюсть</h4><p>Стопы на пол, язык мягкий, челюсть свободна, плечи ниже.</p><span class="chip">1 минута</span></div><div class="smallCard"><h4>3. Возврат в реальность</h4><p>10 предметов, 5 звуков, 3 телесных ощущения.</p><span class="chip">3 минуты</span></div></div></article>`}
function renderRelations(){ $('#relationsPanel').innerHTML=`<article class="card">${head('♡','Отношения: факты вместо додумок','для “я не важна”, контроля, обиды и капитуляции')}<div class="tableWrap"><table><thead><tr><th>Ситуация</th><th>Что он/она сделал</th><th>Что я додумала</th><th>Факт</th><th>Взрослая фраза</th></tr></thead><tbody><tr><td>Человек ушёл в телефон</td><td>Смотрит экран</td><td>“Ему не до меня, я не важна”</td><td>Он сейчас в телефоне. Причина не доказана.</td><td>“Ты сейчас занят? Мне хочется немного внимания. Когда сможешь быть со мной?”</td></tr><tr><td>Ответ задержался</td><td>Нет ответа</td><td>“Меня бросают”</td><td>Ответа пока нет.</td><td>“Я подожду до … и займусь своим делом. Потом уточню спокойно.”</td></tr><tr><td>Мне предлагают неудобное</td><td>Просьба или давление</td><td>“Нужно согласиться, иначе конфликт”</td><td>У меня есть право на паузу.</td><td>“Мне нужно подумать. Я отвечу позже.”</td></tr></tbody></table></div></article><div class="footerNote"><b>Важно.</b> Дашборд — опора между сессиями. Он не заменяет психолога, терапию или медицинскую помощь.</div>`}

const SEARCH_SECTIONS=[
 {tab:'memo',title:'Памятка',words:['памят','вход','стоп','ситуац','чувств','мысл','автомат','критик','родитель','взрослый']},

 {tab:'strategies',title:'Стратегии и выходы',words:['страт','копинг','капитул','избег','гипер','бей','беги','замри','выход']},
 {tab:'modes',title:'Режимы',words:['режим','уязвимый ребёнок','сердитый','счастливый','капитулянт','защитник','самоутешитель','наказывающий','требовательный']},

];
function normSearch(s){return (s||'').toLowerCase().trim().replace(/ё/g,'е')}
function searchMatches(raw){
  const q=normSearch(raw); if(!q)return [];
  const out=[];
  SCHEMAS.forEach(s=>{
    const hay=normSearch([s.name,s.domainTitle,s.need,s.desc,s.cap,s.avoid,s.hyper,s.exit].join(' '));
    if(hay.includes(q)||q.includes(normSearch(s.name).split('/')[0].trim())) out.push({type:'schema',title:s.name,sub:`Домен ${s.domain}: ${s.domainTitle}`,id:s.id,tab:'schemas'});
  });
  SEARCH_SECTIONS.forEach(sec=>{
    const ok=sec.words.some(w=>q.includes(normSearch(w))||normSearch(w).includes(q));
    if(ok) out.push({type:'section',title:sec.title,sub:'Открыть раздел',tab:sec.tab});
  });
  const seen=new Set();
  return out.filter(x=>{const key=x.type+'|'+(x.id||x.tab);if(seen.has(key))return false;seen.add(key);return true}).slice(0,12);
}
function openSearchSheet(q,matches){
  $('#sheetContent').innerHTML=`<h2 style="margin:0 0 8px">Поиск</h2><p class="sub">Запрос: <b>${q||'—'}</b></p>`+(matches.length?`<div class="smallCards">${matches.map(m=>`<button class="btn secondary" style="text-align:left;box-shadow:none" data-search-type="${m.type}" data-search-id="${m.id||''}" data-search-tab="${m.tab}"><b>${m.title}</b><br><span class="sub">${m.sub}</span></button>`).join('')}</div>`:`<div class="footerNote">Ничего не нашла. Попробуй: “самопожертвование”, “памятка”, “капитуляция”, “тело”, “отношения”, “прогресс”.</div>`);
  $('#sheet').classList.add('open');
  $$('[data-search-tab]').forEach(btn=>btn.onclick=()=>{const type=btn.dataset.searchType;const tab=btn.dataset.searchTab;const id=btn.dataset.searchId;$('#sheet').classList.remove('open');activate(tab);if(type==='schema'&&id)setTimeout(()=>openSchema(id),80)});
}
function runSearch(showSheet=false){
  const q=$('#searchInput').value; const matches=searchMatches(q); $('#searchBtn').classList.toggle('found',!!matches.length);
  if(!q.trim()){ $('#searchInput').focus(); return; }
  if(showSheet){ if(matches.length===1&&matches[0].type==='schema'){activate('schemas');setTimeout(()=>openSchema(matches[0].id),80)}else{openSearchSheet(q,matches)}; return; }
  if(matches[0])activate(matches[0].tab);
}
$('#searchInput').addEventListener('input',()=>runSearch(false));
$('#searchInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();runSearch(true)}});
$('#searchBtn').addEventListener('click',e=>{e.preventDefault();runSearch(true)});
if(localStorage.getItem(LS_THEME)==='night'){$('#nightBtn').click()}renderAll();
